<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EnhancifAI - Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <!-- Include Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
    >
    <!-- Custom CSS -->
    <style>
        :root {
            /* Primary Colors */
            --primary-blue: #0078FF;       /* For headers and primary buttons */
            --primary-light-blue: #E6F2FF; /* Light background accents and highlights */

            /* Text Colors */
            --text-dark: #1A1A1A;          /* Main text color */
            --text-muted: #757575;         /* Muted/placeholder text color */

            /* Button and Action Colors */
            --button-blue: #0078FF;        /* Button background */
            --button-hover-blue: #005FCC;  /* Button hover state */
            --border-blue: #A6DAFF;        /* Border for upload and selection areas */

            /* Background Colors */
            --background-light: #F8FBFF;   /* Light background color for the page */

            /* Miscellaneous */
            --shadow-color: rgba(0, 0, 0, 0.1); /* Light shadow for elements */
        }

        body {
            padding-top: 56px;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--primary-blue);
        }

        .navbar .navbar-brand {
            color: #fff;
            /* Center the navbar brand */
            margin: 0 auto;
        }

        .nav-tabs .nav-link {
            color: var(--text-muted);
        }

        .nav-tabs .nav-link.active {
            color: #fff;
            background-color: var(--primary-blue);
            border-color: var(--primary-blue) var(--primary-blue) var(--background-light);
        }

        .form-control {
            border-color: var(--border-blue);
        }

        .form-control:disabled, .form-control[readonly] {
            background-color: var(--primary-light-blue);
        }

        .alert {
            display: none;
        }

        .btn-primary, .btn-danger, .btn-secondary {
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-primary {
            background-color: var(--button-blue);
            border-color: var(--button-blue);
        }

        .btn-primary:hover, .btn-primary:focus {
            background-color: var(--button-hover-blue);
            border-color: var(--button-hover-blue);
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-dark);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        /* Adjusted H1 and H2 Styles */
        h1 {
            font-size: 1.50rem; /* Reduced size */
            text-align: center;  /* Center alignment */
            color: var(--primary-blue); /* Enhanced color for visibility */
        }

        h2 {
            font-size: 1rem; /* Reduced size */
            color: var(--primary-blue); /* Enhanced color for visibility */
        }

        table.table {
            background-color: #fff;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: var(--primary-light-blue);
        }

        /* Tooltip */
        .tooltip-inner {
            max-width: 200px;
            text-align: left;
        }
    
        /* Adjustments for spacing and alignment */
        .form-group {
            margin-bottom: 20px; /* Adds space between form groups */
        }
    
        .btn-group {
            display: flex;
            gap: 10px;
        }
    
        #download-form button[type="submit"] {
            margin-top: 10px;
        }

        /* Billing Entry Styles */
        .billing-entry {
            border: 1px solid var(--border-blue);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #ffffff;
            box-shadow: 0 2px 4px var(--shadow-color);
            display: flex;
            flex-direction: column;
            max-width: 600px; /* Increased width for better layout */
            margin: 0 auto 20px auto; /* Center horizontally with more bottom margin */
        }

        .billing-entry .form-group {
            display: flex;
            flex-direction: row; /* Align label and input horizontally */
            align-items: center;
            gap: 5px; /* Add some spacing between label and input */
            margin-bottom: 15px;
            width: 100%;
        }

        .billing-entry .form-group label {
            flex: 0 0 200px; /* Fixed width for labels */
            margin-bottom: 0;
        }

        .billing-entry .form-group input,
        .billing-entry .form-group select {
            flex: 1;
            width: 100%; /* Make inputs/select take full width */
            max-width: 300px; /* Optional: Set a maximum width */
        }

        .btn-remove {
            align-self: flex-end;
            margin-top: 10px; /* Adds space above the button */
        }

        /* Buttons Container in Billing Form */
        .billing-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Add this snippet to override the default .alert display and positioning for billing success message */
        #billing-success-message {
            display: none;               /* Hide by default */
            position: fixed;             /* Fix to the top */
            top: 56px;                   /* Just below the fixed navbar height */
            left: 50%;                   /* Center horizontally */
            transform: translateX(-50%);
            z-index: 9999;              /* Ensure it stays above other elements */
            /* Remove mt-3 below if you want it flush with the top */
            /* margin-top: 0 !important; */
        }

        /* Hide Add Model Price Button */
        #add-model-price {
            display: none;
        }
    </style>    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <a class="navbar-brand mx-auto" href="#">EnhancifAI Admin Dashboard</a>
    </nav>

    <div class="container-fluid">
        <!-- Tabs -->
        <ul class="nav nav-tabs mt-3" id="adminTab" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="logs-tab" data-bs-toggle="tab" href="#logs" role="tab" aria-controls="logs" aria-selected="true">Logs</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="prompt-improver-tab" data-bs-toggle="tab" href="#prompt-improver" role="tab" aria-controls="prompt-improver" aria-selected="false">Prompt Improver</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="dashboard/billing">Billing</a>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="adminTabContent">
            <!-- Logs Tab -->
            <div class="tab-pane fade show active" id="logs" role="tabpanel" aria-labelledby="logs-tab">
                <div class="container mt-4">
                    <h1>Download Logs (CSV)</h1>
                    <form id="download-form">
                        <!-- Log Category Selection -->
                        <div class="form-group">
                            <label for="log_category">Log Category:</label>
                            <select id="log_category" name="log_category" required class="form-control">
                                <option value="runs">Run Logs</option>
                                <option value="pi_runs">Prompt Improver Logs</option>
                            </select>
                        </div>
                        
                        <!-- Start Date & Time -->
                        <div class="form-group">
                            <label for="start_date">Start Date & Time (UTC):</label>
                            <input type="datetime-local" id="start_date" name="start_date" required class="form-control">
                        </div>
                        
                        <!-- End Date & Time -->
                        <div class="form-group">
                            <label for="end_date">End Date & Time (UTC):</label>
                            <input type="datetime-local" id="end_date" name="end_date" required class="form-control">
                        </div>
                        
                        <!-- Quick Date Ranges -->
                        <div class="btn-group mb-3" role="group" aria-label="Quick date ranges">
                            <button type="button" class="btn btn-secondary" onclick="setDateRange(7)">Last 7 days</button>
                            <button type="button" class="btn btn-secondary" onclick="setDateRange(30)">Last 30 days</button>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary">Download Selected Logs as CSV</button>
                        
                        <!-- Loading Spinner -->
                        <div id="loading-spinner" class="spinner-border text-primary mt-3" role="status" style="display: none;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        
                        <!-- Error Message -->
                        <div id="logs-error" class="alert alert-danger mt-3">Error downloading CSV. Please try again.</div>
                    </form>
                </div>
            </div>

            <!-- Prompt Improver Tab -->
            <div class="tab-pane fade" id="prompt-improver" role="tabpanel" aria-labelledby="prompt-improver-tab">
                <div class="container mt-4">
                    <h1>EnhancifAI Prompt Improver</h1>
                    <form id="settings-form">
                        <div class="form-group">
                            <label for="prompt">Prompt:</label>
                            <textarea id="prompt" name="prompt" required class="form-control" rows="6" style="resize: vertical;"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="ai_engine">AI Engine: <i class="bi bi-question-circle" data-bs-toggle="tooltip" data-bs-placement="top" title="Select the AI engine to use. GPT-4o is more advanced."></i></label>
                            <select id="ai_engine" name="ai_engine" required class="form-control">
                                <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                                <option value="gpt-4o">GPT-4o</option>
                                <option value="gpt-4o-mini">GPT-4o Mini</option>
                                <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm">Save Settings</button>
                        <div id="success-message" class="alert alert-success mt-3">Settings saved successfully!</div>
                    </form>

                    <h2 class="mt-5">Prompt History</h2>
                    <!-- <input type="text" id="prompt-history-search" class="form-control" placeholder="Search prompt history"> -->
                    <div id="loading-message" class="alert alert-info">Loading prompt history...</div>
                    <table class="table table-striped mt-3">
                        <thead>
                            <tr>
                                <th>Version</th>
                                <th>Prompt</th>
                                <th>AI Engine</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="prompt-history">
                            <!-- Prompt versions will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
  
        </div>
    </div>

    <!-- Include jQuery and Bootstrap JS -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>

    <!-- Custom JS -->
    <script>
        // Initialize Bootstrap tooltips
        function initializeTooltips() {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        }

        // Logs Tab JavaScript
        $(document).ready(function() {
            const logCategorySelect = document.getElementById('log_category');
            const startDateInput = document.getElementById('start_date');
            const endDateInput = document.getElementById('end_date');
            const logsError = document.getElementById('logs-error');
            const loadingSpinner = document.getElementById('loading-spinner');

            const now = new Date();
            const startDate = new Date(now.getTime() - 24 * 60 * 60 * 1000); // 24 hours ago
            startDateInput.value = startDate.toISOString().slice(0,16);
            endDateInput.value = now.toISOString().slice(0,16);

            $('#download-form').on('submit', function(event) {
                event.preventDefault();
                logsError.style.display = 'none';
                loadingSpinner.style.display = 'block';

                const logCategory = logCategorySelect.value;
                const startDateValue = $('#start_date').val();
                const endDateValue = $('#end_date').val();

                // Determine the endpoint based on selected log category
                let endpoint = '';
                let filename = '';
                if (logCategory === 'runs') {
                    endpoint = `/admin/logs/runs/csv?start_date=${encodeURIComponent(startDateValue)}&end_date=${encodeURIComponent(endDateValue)}`;
                    filename = 'run_logs.csv';
                } else if (logCategory === 'pi_runs') {
                    endpoint = `/admin/logs/pi_runs/csv?start_date=${encodeURIComponent(startDateValue)}&end_date=${encodeURIComponent(endDateValue)}`;
                    filename = 'prompt_improver_run_logs.csv';
                } else {
                    logsError.textContent = 'Invalid log category selected.';
                    logsError.style.display = 'block';
                    loadingSpinner.style.display = 'none';
                    return;
                }

                fetch(endpoint, {
                    method: 'GET'
                })
                .then(response => {
                    if (response.ok) {
                        return response.blob();
                    } else {
                        throw new Error('Error downloading CSV. Please try again.');
                    }
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link); // Append to body for Firefox compatibility
                    link.click();
                    link.remove(); // Remove the link after clicking
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => {
                    logsError.style.display = 'block';
                    logsError.textContent = error.message;
                    console.error(error.message);
                })
                .finally(() => {
                    loadingSpinner.style.display = 'none';
                });
            });
        });

        function setDateRange(days) {
            const now = new Date();
            const startDate = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
            document.getElementById('start_date').value = startDate.toISOString().slice(0,16);
            document.getElementById('end_date').value = now.toISOString().slice(0,16);
        }

        // Prompt Improver Tab JavaScript
        const promptField = document.getElementById('prompt');
        const aiEngineField = document.getElementById('ai_engine');
        const promptHistoryTable = document.getElementById('prompt-history');
        const settingsForm = document.getElementById('settings-form');
        const successMessage = document.getElementById('success-message');
        const loadingMessage = document.getElementById('loading-message');
        const saveButton = settingsForm.querySelector('button');

        function logResponse(response) {
            console.log('Server Response:', response);
        }

        async function fetchPromptHistory() {
            loadingMessage.style.display = 'block';
            promptHistoryTable.innerHTML = '';

            try {
                const response = await fetch('/admin/prompt-improver/prompts', {
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                logResponse(data);

                if (data.prompts && Array.isArray(data.prompts)) {
                    promptHistoryTable.innerHTML = data.prompts.map(prompt => `
                        <tr>
                            <td>${prompt.version}</td>
                            <td>${prompt.prompt}</td>
                            <td>${prompt.ai_engine}</td>
                            <td>${prompt.created_at}</td>
                            <td><button class="btn btn-success btn-sm" onclick="restorePrompt(${prompt.version})">Restore</button></td>
                        </tr>
                    `).join('');
                } else {
                    promptHistoryTable.innerHTML = '<tr><td colspan="5">No prompt history available</td></tr>';
                }
            } catch (error) {
                console.error("Failed to fetch prompt history:", error);
                promptHistoryTable.innerHTML = '<tr><td colspan="5">Error loading prompt history</td></tr>';
            } finally {
                loadingMessage.style.display = 'none';
            }
        }

        async function restorePrompt(version) {
            try {
                const response = await fetch(`/admin/prompt-improver/prompts/${version}`, {
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                logResponse(data);

                promptField.value = data.prompt;
                aiEngineField.value = data.ai_engine;

                alert('Prompt restored to version ' + version);

            } catch (error) {
                console.error('Error restoring prompt:', error);
                alert('Error restoring prompt. Please try again.');
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/admin/prompt-improver/settings', {
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                logResponse(data);

                promptField.value = data.prompt;
                aiEngineField.value = data.ai_engine;
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        settingsForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            successMessage.style.display = 'none';
            saveButton.disabled = true;

            const formData = {
                prompt: promptField.value,
                ai_engine: aiEngineField.value,
            };

            try {
                const response = await fetch('/admin/prompt-improver/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Cache-Control': 'no-cache'
                    },
                    body: JSON.stringify(formData),
                });

                if (!response.ok) {
                    throw new Error('Failed to save settings');
                }

                const result = await response.json();
                logResponse(result);

                successMessage.style.display = 'block';
                fetchPromptHistory();

            } catch (error) {
                console.error('Error saving settings:', error);
                alert('Error saving settings. Please try again.');
            } finally {
                saveButton.disabled = false;
            }
        });

        loadSettings();
        fetchPromptHistory();
        initializeTooltips();

    </script>
</body>
</html>
