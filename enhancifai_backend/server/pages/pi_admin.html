<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnhancifAI - Prompt Improver Admin</title>
    <style>
        /* Your existing styles */
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Settings</h1>
        <form id="settings-form">
            <div class="form-group">
                <label for="prompt">Prompt:</label>
                <textarea id="prompt" name="prompt" required></textarea>
            </div>
            <div class="form-group">
                <label for="ai_engine">AI Engine:</label>
                <select id="ai_engine" name="ai_engine" required>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                </select>
            </div>
            <button type="submit">Save Settings</button>
        </form>

        <h2>Prompt History</h2>
        <table>
            <thead>
                <tr>
                    <th>Version</th>
                    <th>Prompt</th>
                    <th>AI Engine</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="prompt-history">
                <!-- Prompt versions will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        const promptHistoryTable = document.getElementById('prompt-history');

        async function fetchPromptHistory() {
            const response = await fetch('/admin/prompt-improver/prompts');
            const data = await response.json();

            promptHistoryTable.innerHTML = data.prompts.map(prompt => `
                <tr>
                    <td>${prompt.version}</td>
                    <td>${prompt.prompt}</td>
                    <td>${prompt.ai_engine}</td>
                    <td>${prompt.created_at}</td>
                    <td><button onclick="restorePrompt(${prompt.version})">Restore</button></td>
                </tr>
            `).join('');
        }

        async function restorePrompt(version) {
            const response = await fetch(`/admin/prompt-improver/prompts/${version}`);
            const data = await response.json();
            
            document.getElementById('prompt').value = data.prompt;
            document.getElementById('ai_engine').value = data.ai_engine;
        }

        fetchPromptHistory();
    </script>
</body>
</html>
