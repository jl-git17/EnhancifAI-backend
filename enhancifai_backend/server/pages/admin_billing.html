<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EnhancifAI - Admin Dashboard (Billing)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Include Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <!-- Include Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
    >
    <!-- Custom CSS (same as your original) -->
    <style>
        :root {
            /* Primary Colors */
            --primary-blue: #0078FF;       /* For headers and primary buttons */
            --primary-light-blue: #E6F2FF; /* Light background accents and highlights */

            /* Text Colors */
            --text-dark: #1A1A1A;          /* Main text color */
            --text-muted: #757575;         /* Muted/placeholder text color */

            /* Button and Action Colors */
            --button-blue: #0078FF;        /* Button background */
            --button-hover-blue: #005FCC;  /* Button hover state */
            --border-blue: #A6DAFF;        /* Border for upload and selection areas */

            /* Background Colors */
            --background-light: #F8FBFF;   /* Light background color for the page */

            /* Miscellaneous */
            --shadow-color: rgba(0, 0, 0, 0.1); /* Light shadow for elements */
        }

        body {
            padding-top: 56px;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--primary-blue);
        }

        .navbar .navbar-brand {
            color: #fff;
            margin: 0 auto;
        }

        /* Nav tab styling (even though we have only one tab here, 
           leaving styles for consistency) */
        .nav-tabs .nav-link {
            color: var(--text-muted);
        }
        .nav-tabs .nav-link.active {
            color: #fff;
            background-color: var(--primary-blue);
            border-color: var(--primary-blue) var(--primary-blue) var(--background-light);
        }

        .form-control {
            border-color: var(--border-blue);
        }
        .form-control:disabled, .form-control[readonly] {
            background-color: var(--primary-light-blue);
        }

        .alert {
            display: none;
        }

        .btn-primary, .btn-danger, .btn-secondary {
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-primary {
            background-color: var(--button-blue);
            border-color: var(--button-blue);
        }
        .btn-primary:hover, .btn-primary:focus {
            background-color: var(--button-hover-blue);
            border-color: var(--button-hover-blue);
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-dark);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        /* Adjusted H1 and H2 Styles */
        h1 {
            font-size: 1.50rem;
            text-align: center;
            color: var(--primary-blue);
        }
        h2 {
            font-size: 1rem;
            color: var(--primary-blue);
        }

        table.table {
            background-color: #fff;
            box-shadow: 0 2px 4px var(--shadow-color);
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: var(--primary-light-blue);
        }

        /* Tooltip */
        .tooltip-inner {
            max-width: 200px;
            text-align: left;
        }

        /* Billing Entry Styles */
        .billing-entry {
            border: 1px solid var(--border-blue);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #ffffff;
            box-shadow: 0 2px 4px var(--shadow-color);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto 20px auto; /* center horizontally */
        }
        .billing-entry .form-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            width: 100%;
        }
        .billing-entry .form-group label {
            flex: 0 0 200px;
            margin-bottom: 0;
        }
        .billing-entry .form-group input,
        .billing-entry .form-group select {
            flex: 1;
            max-width: 300px;
        }
        .btn-remove {
            align-self: flex-end;
            margin-top: 10px;
        }

        /* Alert message positioning for billing success */
        #billing-success-message {
            display: none;
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }
    </style>
</head>

<body>
    <!-- Navbar (same as original) -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <a class="navbar-brand mx-auto" href="#">EnhancifAI Admin Dashboard</a>
    </nav>

    <!-- Container for Billing Section -->
    <div class="container mt-4">
        <h1>Billing Management</h1>
        
        <!-- B I L L I N G   T A B   C O N T E N T -->
        <div>
          <!-- Current Month heading -->
          <h3 id="current-month-label">Prices for ...</h3>

          <form id="billing-form">
            <div id="model-prices-container"></div>
            <button type="button" class="btn btn-secondary" id="add-model-price">
              <i class="bi bi-plus"></i> Add New Model Price
            </button>
            <button type="submit" class="btn btn-primary">Save Current Month Prices</button>
          </form>

          <div id="billing-success-message" class="alert alert-success mt-2">
            Billing settings saved successfully!
          </div>
        </div>

        <hr/>

        <!-- B I L L I N G   H I S T O R Y -->
        <div>
          <h4>View Historical Prices</h4>
          <select id="history-month-picker" class="form-select" style="max-width: 300px;">
            <!-- Populated dynamically -->
          </select>
          <div id="history-model-prices-container" class="mt-3"></div>
        </div>
    </div> <!-- end container -->

    <!-- Include jQuery and Bootstrap JS -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>

    <!-- B I L L I N G   S C R I P T   (from your new_html) -->
    <script>
      // =======================
      // GLOBALS & UTIL FUNCTIONS
      // =======================
      const billingForm = document.getElementById('billing-form');
      const billingSuccessMessage = document.getElementById('billing-success-message');
      const modelPricesContainer = document.getElementById('model-prices-container');
      const currentMonthLabel = document.getElementById('current-month-label');
      const historyMonthPicker = document.getElementById('history-month-picker');
      const historyModelPricesContainer = document.getElementById('history-model-prices-container');

      const currentDate = new Date();
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth() + 1; // 1-based

      function initializeTooltips() {
        // If using Bootstrap 5 tooltips, enable them here:
        let tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
          return new bootstrap.Tooltip(tooltipTriggerEl);
        });
      }

      // Format the heading for the current month
      currentMonthLabel.textContent = `Prices for ${currentDate.toLocaleString('default', { month: 'long', year: 'numeric' })}`;

      // =======================
      // 1. LOAD EARLIEST MONTH
      // =======================
      function loadEarliestMonth() {
        fetch('/admin/billing/model-prices/earliest', {
          headers: { 'Cache-Control': 'no-cache' }
        })
          .then(response => {
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
          })
          .then(data => {
            const earliestStr = data.earliest_month; // e.g. "2022-06-01"
            if (!earliestStr) {
              // No historical data
              historyMonthPicker.innerHTML = `<option disabled>No historical data available</option>`;
              return;
            }
            const earliest = new Date(earliestStr);
            populateMonthPicker(earliest, new Date());
          })
          .catch(error => {
            console.error('Error fetching earliest month:', error);
          });
      }

      function populateMonthPicker(earliestDate, latestDate) {
        historyMonthPicker.innerHTML = '';
        let iterator = new Date(earliestDate);
        iterator.setDate(1); // ensure day is 1

        while (iterator <= latestDate) {
          const y = iterator.getFullYear();
          const m = iterator.getMonth() + 1;
          const displayStr = `${iterator.toLocaleString('default', { month: 'long' })} ${y}`;
          const valueStr = `${y}-${String(m).padStart(2, '0')}`;

          const opt = document.createElement('option');
          opt.value = valueStr;
          opt.textContent = displayStr;
          historyMonthPicker.appendChild(opt);

          // Move to next month
          iterator.setMonth(iterator.getMonth() + 1);
        }
        // By default, select the last option (this month)
        historyMonthPicker.selectedIndex = historyMonthPicker.options.length - 1;
      }

      // On selecting a month in History, fetch that month’s model prices
      historyMonthPicker.addEventListener('change', function() {
        const [yr, mo] = this.value.split('-');
        fetchHistoryModelPrices(parseInt(yr), parseInt(mo));
      });

      function fetchHistoryModelPrices(year, month) {
        historyModelPricesContainer.innerHTML = '<div class="alert alert-info">Loading...</div>';

        fetch(`/admin/billing/model-prices/${year}/${month}`, {
          headers: { 'Cache-Control': 'no-cache' }
        })
          .then(response => {
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
          })
          .then(data => {
            historyModelPricesContainer.innerHTML = '';
            const prices = data.model_prices || [];
            if (prices.length > 0) {
              prices.forEach(price => {
                addModelPrice(price, historyModelPricesContainer, true);
              });
            } else {
              historyModelPricesContainer.innerHTML = '<div class="alert alert-warning">No prices found for this month.</div>';
            }
            initializeTooltips();
          })
          .catch(error => {
            console.error('Error loading history model prices:', error);
            historyModelPricesContainer.innerHTML = '<div class="alert alert-danger">Error loading history model prices.</div>';
          });
      }

      // =======================
      // 2. LOAD MODEL PRICES (current month)
      // =======================
      function loadModelPrices(year = currentYear, month = currentMonth) {
        console.log(`Loading model prices for ${year}-${month}...`);
        modelPricesContainer.innerHTML = '<div class="alert alert-info">Loading...</div>';

        fetch(`/admin/billing/model-prices/${year}/${month}`, {
          headers: { 'Cache-Control': 'no-cache' }
        })
          .then(response => {
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
          })
          .then(data => {
            console.log('Model Prices for month:', data);
            modelPricesContainer.innerHTML = '';

            // We want to ensure that if DB does not have a specific model, 
            // we still show it at 0. Common known models:
            const knownModels = ["gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo"];
            const existingPrices = data.model_prices || [];

            // For each known model, either find or default
            knownModels.forEach(modelName => {
              const match = existingPrices.find(p => p.model_name === modelName);
              if (match) {
                addModelPrice(match, modelPricesContainer, false);
              } else {
                addModelPrice({ model_name: modelName, price_per_token: 0 }, modelPricesContainer, false);
              }
            });

            // Also display any additional unknown models
            existingPrices.forEach(dbPrice => {
              if (!knownModels.includes(dbPrice.model_name)) {
                addModelPrice(dbPrice, modelPricesContainer, false);
              }
            });

            initializeTooltips();
          })
          .catch(error => {
            console.error('Error loading model prices:', error);
            modelPricesContainer.innerHTML = '<div class="alert alert-danger">Error loading model prices.</div>';
          });
      }

      // =======================
      // 3. ADD/REMOVE PRICE ENTRY
      // =======================
      function addModelPrice(model = { model_name: '', price_per_token: '' }, container, readonly = false) {
        if (!container) container = modelPricesContainer;

        const billingEntry = document.createElement('div');
        billingEntry.classList.add('billing-entry', 'mb-3', 'p-2', 'border', 'rounded');

        // Model Name
        const modelNameGroup = document.createElement('div');
        modelNameGroup.classList.add('form-group', 'mb-2');
        
        const modelNameLabel = document.createElement('label');
        modelNameLabel.textContent = 'Model Name:';

        const modelNameSelect = document.createElement('select');
        modelNameSelect.classList.add('form-control');
        modelNameSelect.name = 'model_name';

        const options = ["gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo"];
        options.forEach(opt => {
          const optionEl = document.createElement('option');
          optionEl.value = opt;
          optionEl.textContent = opt;
          if (model.model_name === opt) {
            optionEl.selected = true;
          }
          modelNameSelect.appendChild(optionEl);
        });

        if (readonly) {
          modelNameSelect.disabled = true;
        }

        modelNameGroup.appendChild(modelNameLabel);
        modelNameGroup.appendChild(modelNameSelect);

        // Price
        const priceGroup = document.createElement('div');
        priceGroup.classList.add('form-group', 'mb-2');

        const priceLabel = document.createElement('label');
        priceLabel.textContent = 'Price per 1,000 tokens: ';

        const tooltipIcon = document.createElement('i');
        tooltipIcon.classList.add('bi', 'bi-question-circle');
        tooltipIcon.setAttribute('data-bs-toggle', 'tooltip');
        tooltipIcon.setAttribute('title', 'Enter the price per 1,000 tokens (the server will store price_per_token = this / 1000).');
        priceLabel.appendChild(tooltipIcon);

        const priceInput = document.createElement('input');
        priceInput.type = 'number';
        priceInput.step = 'any';
        priceInput.classList.add('form-control');
        priceInput.name = 'price_per_token';

        // DB stores e.g. 0.001 if it's $1 per 1,000 tokens
        const dbValue = parseFloat(model.price_per_token) || 0; 
        const displayValue = dbValue * 1000; 
        priceInput.value = displayValue.toFixed(4);

        if (readonly) {
          priceInput.disabled = true;
        }

        priceGroup.appendChild(priceLabel);
        priceGroup.appendChild(priceInput);

        billingEntry.appendChild(modelNameGroup);
        billingEntry.appendChild(priceGroup);

        // Remove button if not readonly
        if (!readonly) {
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.classList.add('btn', 'btn-danger', 'btn-sm', 'mt-2');
          removeBtn.innerHTML = '<i class="bi bi-trash"></i> Remove';
          removeBtn.onclick = () => billingEntry.remove();
          billingEntry.appendChild(removeBtn);
        }

        container.appendChild(billingEntry);
      }

      // =======================
      // 4. SAVE LOGIC
      // =======================
      billingForm.addEventListener('submit', function(event) {
        event.preventDefault();
        billingSuccessMessage.style.display = 'none';

        const data = [];
        const billingEntries = document.querySelectorAll('.billing-entry');
        billingEntries.forEach(entry => {
          const modelNameSelect = entry.querySelector('select[name="model_name"]');
          const priceInput = entry.querySelector('input[name="price_per_token"]');

          const model_name = modelNameSelect.value.trim();
          const price_per_1000 = parseFloat(priceInput.value);
          if (isNaN(price_per_1000)) {
            alert('Please enter a valid numeric value for price.');
            return;
          }
          data.push({
            model_name,
            price_per_token: price_per_1000  // server will handle dividing by 1000
          });
        });

        fetch('/admin/billing/model-prices', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache'
          },
          body: JSON.stringify({
            year: currentYear,
            month: currentMonth,
            prices: data
          })
        })
        .then(response => {
          if (response.ok) {
            return response.json();
          }
          throw new Error('Failed to save prices.');
        })
        .then(resp => {
          console.log('Save response:', resp);
          billingSuccessMessage.style.display = 'block';
          loadModelPrices(currentYear, currentMonth);
          setTimeout(() => {
            billingSuccessMessage.style.display = 'none';
          }, 3000);
        })
        .catch(error => {
          console.error('Error updating billing settings:', error);
          alert('Error updating billing settings. Please try again.');
        });
      });

      // =======================
      // 5. ADD MODEL PRICE BUTTON
      // =======================
      const addModelPriceBtn = document.getElementById('add-model-price');
      if (addModelPriceBtn) {
        addModelPriceBtn.addEventListener('click', () => {
          addModelPrice({ model_name: "", price_per_token: 0 }, modelPricesContainer, false);
        });
      }

      // =======================
      // INITIALIZE ON PAGE LOAD
      // =======================
      document.addEventListener('DOMContentLoaded', () => {
        loadEarliestMonth();
        loadModelPrices(currentYear, currentMonth);
        initializeTooltips();
      });
    </script>

</body>
</html>
