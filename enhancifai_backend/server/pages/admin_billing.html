<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EnhancifAI - Admin Dashboard (Billing)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Include Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <!-- Include Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"
    >
    <!-- Custom CSS (same as your original) -->
    <style>
        :root {
            /* Primary Colors */
            --primary-blue: #0078FF;       /* For headers and primary buttons */
            --primary-light-blue: #E6F2FF; /* Light background accents and highlights */

            /* Text Colors */
            --text-dark: #1A1A1A;          /* Main text color */
            --text-muted: #757575;         /* Muted/placeholder text color */

            /* Button and Action Colors */
            --button-blue: #0078FF;        /* Button background */
            --button-hover-blue: #005FCC;  /* Button hover state */
            --border-blue: #A6DAFF;        /* Border for upload and selection areas */

            /* Background Colors */
            --background-light: #F8FBFF;   /* Light background color for the page */

            /* Miscellaneous */
            --shadow-color: rgba(0, 0, 0, 0.1); /* Light shadow for elements */
        }

        body {
            padding-top: 56px;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .navbar {
            background-color: var(--primary-blue);
        }

        .navbar .navbar-brand {
            color: #fff;
            margin: 0 auto;
        }

        /* Nav tab styling (even though we have only one tab here, 
           leaving styles for consistency) */
        .nav-tabs .nav-link {
            color: var(--text-muted);
        }
        .nav-tabs .nav-link.active {
            color: #fff;
            background-color: var(--primary-blue);
            border-color: var(--primary-blue) var(--primary-blue) var(--background-light);
        }

        .form-control {
            border-color: var(--border-blue);
        }
        .form-control:disabled, .form-control[readonly] {
            background-color: var(--primary-light-blue);
        }

        .alert {
            display: none;
        }

        .btn-primary, .btn-danger, .btn-secondary {
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-primary {
            background-color: var(--button-blue);
            border-color: var(--button-blue);
        }
        .btn-primary:hover, .btn-primary:focus {
            background-color: var(--button-hover-blue);
            border-color: var(--button-hover-blue);
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-dark);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        /* Adjusted H1 and H2 Styles */
        h1 {
            font-size: 1.50rem;
            text-align: center;
            color: var(--primary-blue);
        }
        h2 {
            font-size: 1rem;
            color: var(--primary-blue);
        }

        table.table {
            background-color: #fff;
            box-shadow: 0 2px 4px var(--shadow-color);
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: var(--primary-light-blue);
        }

        /* Tooltip */
        .tooltip-inner {
            max-width: 200px;
            text-align: left;
        }

        /* Billing Entry Styles */
        .billing-entry {
            border: 1px solid var(--border-blue);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #ffffff;
            box-shadow: 0 2px 4px var(--shadow-color);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto 20px auto; /* center horizontally */
        }
        .billing-entry .form-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            width: 100%;
        }
        .billing-entry .form-group label {
            flex: 0 0 200px;
            margin-bottom: 0;
        }
        .billing-entry .form-group input,
        .billing-entry .form-group select {
            flex: 1;
            max-width: 300px;
        }
        .btn-remove {
            align-self: flex-end;
            margin-top: 10px;
        }

        /* Alert message positioning for billing success */
        #billing-success-message {
            display: none;
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        /* Disable remove button for default models */
        .btn-remove.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Highlight that historical data is view-only */
        #history-model-prices-container table {
            cursor: default;
        }
        /* Remove any hover effects that imply editability */
        #history-model-prices-container table tr:hover {
            background-color: var(--primary-light-blue);
        }

        .form-group .price-per-token::after {
            content: ' per 1,000 tokens';
            margin-left: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <!-- Navbar (same as original) -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <a class="navbar-brand mx-auto" href="#">EnhancifAI Admin Dashboard</a>
        <a class="navbar-link ms-auto me-auto" href="/admin/dashboard">Back to Dashboard</a>
    </nav>

    <!-- Container for Billing Section -->
    <div class="container mt-4">
        <h1>Billing Management</h1>
        
        <!-- B I L L I N G   T A B   C O N T E N T -->
        <div>
          <!-- Current Month heading -->
          <h3 id="current-month-label">Prices for ...</h3>

          <form id="billing-form">
            <div id="model-prices-container">
                <!-- Existing model price entries will be populated here -->
            </div>
            <!-- Remove the Add Model Price button -->
            <!--
            <button type="button" id="add-model-price" class="btn btn-secondary mb-3">
                <i class="bi bi-plus-circle"></i> Add Model Price
            </button>
            -->
            <button type="submit" class="btn btn-primary">Save Prices</button>
          </form>

          <div id="billing-success-message" class="alert alert-success mt-2">
              Prices updated successfully.
          </div>
        </div>

        <hr/>

        <!-- B I L L I N G   H I S T O R Y -->
        <div>
          <h4>View Historical Prices</h4>
          <select id="history-month-picker" class="form-select" style="max-width: 300px;">

          </select>
          <div id="history-model-prices-container" class="mt-3">
            <!-- Ensuring the table is read-only by removing any edit options -->
          </div>
        </div>
    </div> <!-- end container -->

    <!-- Include jQuery and Bootstrap JS -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous">
    </script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
    </script>

    <!-- B I L L I N G   S C R I P T   (from your new_html) -->
    <script>
      // =======================
      // GLOBALS & UTIL FUNCTIONS
      // =======================
      const billingForm = document.getElementById('billing-form');
      const billingSuccessMessage = document.getElementById('billing-success-message');
      const modelPricesContainer = document.getElementById('model-prices-container');
      const currentMonthLabel = document.getElementById('current-month-label');
      const historyMonthPicker = document.getElementById('history-month-picker');
      const historyModelPricesContainer = document.getElementById('history-model-prices-container');

      const currentDate = new Date();
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth() + 1; // 1-based

      // Update defaultModels with specified models
      const defaultModels = [
        { model_name: 'gpt-4.1-nano', price: 0, isDefault: true},
        { model_name: 'gpt-4o', price: 0, isDefault: true },
        { model_name: 'gpt-4o-mini', price: 0, isDefault: true },
        { model_name: 'gpt-3.5-turbo', price: 0, isDefault: true }
      ];

      function initializeTooltips() {
        // If using Bootstrap 5 tooltips, enable them here:
        let tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltipTriggerList.map(function (tooltipTriggerEl) {
          return new bootstrap.Tooltip(tooltipTriggerEl);
        });
      }

      // Format the heading for the current month
      currentMonthLabel.textContent = `Prices for ${currentDate.toLocaleString('default', { month: 'long', year: 'numeric' })}`;

      // =======================
      // 1. LOAD EARLIEST MONTH
      // =======================
      function loadEarliestMonth() {
        fetch('/admin/billing/model-prices/earliest', {
          headers: { 'Cache-Control': 'no-cache' }
        })
        .then(response => response.json())
        .then(data => {
            const earliestDate = new Date(data.earliest_month);
            populateMonthPicker(earliestDate, currentDate);
        })
        .catch(error => {
            console.error('Error fetching earliest month:', error);
        });
      }

      function populateMonthPicker(earliestDate, latestDate) {
        historyMonthPicker.innerHTML = '';
        let iterator = new Date(earliestDate);
        iterator.setDate(1); // ensure day is 1

        while (iterator <= latestDate) {
            const option = document.createElement('option');
            option.value = `${iterator.getFullYear()}-${iterator.getMonth() + 1}`;
            option.textContent = iterator.toLocaleString('default', { month: 'long', year: 'numeric' });
            historyMonthPicker.appendChild(option);
            iterator.setMonth(iterator.getMonth() + 1);
        }
        // By default, select the last option (this month)
        historyMonthPicker.selectedIndex = historyMonthPicker.options.length - 1;
        fetchHistoryModelPrices(currentYear, currentMonth);
      }

      // On selecting a month in History, fetch that month’s model prices
      historyMonthPicker.addEventListener('change', function() {
        const [yr, mo] = this.value.split('-');
        fetchHistoryModelPrices(parseInt(yr), parseInt(mo));
      });

      function fetchHistoryModelPrices(year, month) {
        historyModelPricesContainer.innerHTML = '<div class="alert alert-info">Loading...</div>';

        fetch(`/admin/billing/model-prices/${year}/${month}`, {
          headers: { 'Cache-Control': 'no-cache' }
        })
        .then(response => response.json())
        .then(data => {
            const prices = data.model_prices;
            if (prices.length === 0) {
                historyModelPricesContainer.innerHTML = '<div class="alert alert-warning">No prices found for this month.</div>';
                return;
            }

            let table = `<table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Model Name</th>
                                    <th>Price per 1,000 Tokens</th>
                                </tr>
                            </thead>
                            <tbody>`;
            prices.forEach(price => {
                table += `<tr>
                            <td>${price.model_name}</td>
                            <td>$${(price.price * 1000).toFixed(5)}</td> <!-- Convert price per token to per 1,000 tokens -->
                          </tr>`;
            });
            table += `</tbody></table>`;
            historyModelPricesContainer.innerHTML = table;
        })
        .catch(error => {
            console.error('Error fetching historical model prices:', error);
            historyModelPricesContainer.innerHTML = '<div class="alert alert-danger">Failed to load historical prices.</div>';
        });
      }

      // =======================
      // 2. LOAD MODEL PRICES (current month)
      // =======================
      function loadModelPrices(year = currentYear, month = currentMonth) {
        console.log(`Loading model prices for ${year}-${month}...`);
        fetch(`/admin/billing/model-prices/${year}/${month}`, {
          headers: { 'Cache-Control': 'no-cache' }
        })
        .then(response => response.json())
        .then(data => {
            const fetchedPrices = data.model_prices || [];
            const fetchedModelNames = fetchedPrices.map(price => price.model_name);
            
            // Merge fetched prices with default models
            const combinedPrices = [...fetchedPrices];
            defaultModels.forEach(defaultModel => {
                if (!fetchedModelNames.includes(defaultModel.model_name)) {
                    combinedPrices.push(defaultModel);
                }
            });

            modelPricesContainer.innerHTML = '';
            combinedPrices.forEach(price => {
                const isDefault = defaultModels.some(defaultModel => defaultModel.model_name === price.model_name);
                addModelPrice(price, modelPricesContainer, !isDefault); // Allow removal only if not default
            });

            // Inform the user if default models were added
            if (fetchedPrices.length < defaultModels.length) {
                modelPricesContainer.insertAdjacentHTML('beforebegin', '<div class="alert alert-info">Default models have been added.</div>');
            }

            initializeTooltips(); // Initialize tooltips after adding entries
        })
        .catch(error => {
            console.error('Error loading model prices:', error);
            // Ensure default models are displayed even if there's an error
            modelPricesContainer.innerHTML = '';
            defaultModels.forEach(defaultModel => {
                addModelPrice(defaultModel, modelPricesContainer, false);
            });
            initializeTooltips();
        });
      }

      // =======================
      // 3. ADD/REMOVE PRICE ENTRY
      // =======================
      function addModelPrice(model = { model_name: '', price: 0 }, container, removable = true) {
        const entryDiv = document.createElement('div');
        entryDiv.className = 'billing-entry';

        const formGroupModel = document.createElement('div');
        formGroupModel.className = 'form-group';
        const labelModel = document.createElement('label');
        labelModel.textContent = 'Model Name:';
        const inputModel = document.createElement('input');
        inputModel.type = 'text';
        inputModel.className = 'form-control model-name';
        inputModel.value = model.model_name;
        if (model.isDefault) inputModel.readOnly = true;
        formGroupModel.appendChild(labelModel);
        formGroupModel.appendChild(inputModel);

        const formGroupPrice = document.createElement('div');
        formGroupPrice.className = 'form-group';
        const labelPrice = document.createElement('label');
        labelPrice.textContent = 'Price per 1,000 tokens ($):';
        const inputPrice = document.createElement('input');
        inputPrice.type = 'number';
        inputPrice.step = '0.0001';
        inputPrice.className = 'form-control price-per-token';
        inputPrice.value = (model.price * 1000).toFixed(4); // Convert price per token to per 1,000 tokens
        formGroupPrice.appendChild(labelPrice);
        formGroupPrice.appendChild(inputPrice);

        entryDiv.appendChild(formGroupModel);
        entryDiv.appendChild(formGroupPrice);

        // Highlight default models
        if (model.isDefault) {
            entryDiv.style.borderColor = 'var(--primary-blue)';
            entryDiv.style.backgroundColor = 'var(--primary-light-blue)';
            // Add tooltip for default models
            entryDiv.setAttribute('data-bs-toggle', 'tooltip');
            entryDiv.setAttribute('title', 'Default model. Prices are set to $0 and cannot be removed.');
        }

        // Add remove button if removable
        if (removable) {
            const btnRemove = document.createElement('button');
            btnRemove.type = 'button';
            btnRemove.className = 'btn btn-danger btn-remove';
            btnRemove.innerHTML = '<i class="bi bi-trash"></i> Remove';
            btnRemove.addEventListener('click', () => {
                container.removeChild(entryDiv);
            });
            entryDiv.appendChild(btnRemove);
        }

        container.appendChild(entryDiv);
      }

      // =======================
      // 4. SAVE LOGIC
      // =======================
      billingForm.addEventListener('submit', function(event) {
        console.log('Billing form submit event triggered'); // Added for debugging
        event.preventDefault();
        
        // Disable the Save Prices button and show a loading indicator
        const saveButton = billingForm.querySelector('button[type="submit"]');
        saveButton.disabled = true;
        saveButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving...';

        const entries = Array.from(modelPricesContainer.getElementsByClassName('billing-entry'));
        const payload = {
            year: currentYear,
            month: currentMonth,
            prices: []
        };

        let valid = true;
        entries.forEach(entry => {
            const modelName = entry.querySelector('.model-name').value.trim();
            const price = parseFloat(entry.querySelector('.price-per-token').value) / 1000; // Convert per 1,000 tokens to per token
            if (!modelName || isNaN(price) || price < 0) {
                valid = false;
            }
            payload.prices.push({
                model_name: modelName,
                price_per_token: price
            });
        });

        console.log('Payload to be sent:', payload); // Added for debugging

        if (!valid) {
            alert('Please ensure all model names are filled and prices are valid.');
            // Re-enable the Save Prices button and reset its text
            saveButton.disabled = false;
            saveButton.innerHTML = 'Save Prices';
            return;
        }

        fetch('/admin/billing/model-prices', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Cache-Control': 'no-cache'
                // Include authentication headers if necessary
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            console.log('Fetch response received:', response); // Added for debugging
            // Re-enable the Save Prices button and reset its text
            saveButton.disabled = false;
            saveButton.innerHTML = 'Save Prices';
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            console.log('Fetch response data:', data); // Added for debugging
            if (data.message === "Prices updated successfully") {
                billingSuccessMessage.style.display = 'block';
                setTimeout(() => {
                    billingSuccessMessage.style.display = 'none';
                }, 3000);
                loadModelPrices();
                loadEarliestMonth();
            } else {
                alert('Failed to update prices.');
            }
        })
        .catch(error => {
            console.error('Error updating model prices:', error);
            alert('An error occurred while updating prices.');
            // Re-enable the Save Prices button and reset its text in case of error
            saveButton.disabled = false;
            saveButton.innerHTML = 'Save Prices';
        });
      });

      // =======================
      // 5. REMOVE ADD MODEL PRICE BUTTON EVENT LISTENER
      // =======================
      // Removed the event listener for the "Add Model Price" button since it's no longer present
      // <!-- Removed
      // const addModelPriceBtn = document.getElementById('add-model-price');
      // if (addModelPriceBtn) {
      //   addModelPriceBtn.addEventListener('click', () => {
      //       addModelPrice({}, modelPricesContainer, false); // Set removable to false
      //   });
      // -->

      // =======================
      // INITIALIZE ON PAGE LOAD
      // =======================
      document.addEventListener('DOMContentLoaded', () => {
        initializeTooltips();
        loadModelPrices();
        loadEarliestMonth();
      });
    </script>

</body>
</html>
