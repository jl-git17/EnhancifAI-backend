<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnhancifAI - Log Download</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      max-width: 400px;
      margin: 20px;
      padding: 20px;
      border-radius: 5px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin-top: 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input[type="datetime-local"] {
      width: calc(100% - 22px); /* Adjusted width for better alignment */
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    button {
      width: 100%;
      background-color: #3498db;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Download Logs (CSV)</h1>
    <form id="download-form">
      <div class="form-group">
        <label for="start_date">Start Date & Time (UTC):</label>
        <input type="datetime-local" id="start_date" name="start_date" required>
      </div>
      <div class="form-group">
        <label for="end_date">End Date & Time (UTC):</label>
        <input type="datetime-local" id="end_date" name="end_date" required>
      </div>
      <button type="submit">Download CSV</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('download-form');
    const startDateInput = document.getElementById('start_date');
    const endDateInput = document.getElementById('end_date');

    // Set default date-time range to one day with hours and minutes
    const now = new Date();
    const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, now.getHours(), now.getMinutes(), 0).toISOString().slice(0, -1);
    const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), 0).toISOString().slice(0, -1);

    startDateInput.value = startDate.substring(0, 16); // Truncate seconds and milliseconds
    endDateInput.value = endDate.substring(0, 16); // Truncate seconds and milliseconds

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const startDateValue = document.getElementById('start_date').value;
      const endDateValue = document.getElementById('end_date').value;

      const response = await fetch(`/admin/logs/runs/csv?start_date=${startDateValue}&end_date=${endDateValue}`, {
        method: 'GET'
      });

      if (response.ok) {
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'run_logs.csv';
        link.click();
        window.URL.revokeObjectURL(url);
      } else {
        alert('Error downloading CSV. Please try again.');
      }
    });

  </script>
</body>
</html>
